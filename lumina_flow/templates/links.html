<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Links Oficiais • Lumina Flow</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        color-scheme: dark;
        --bg: #050912;
        --card: rgba(13, 18, 32, 0.92);
        --accent: #6c5ce7;
        --accent-2: #3dd8ff;
        --text-strong: #f7f9ff;
        --text-soft: #98a2c2;
        --border: rgba(255, 255, 255, 0.08);
        --radius: 26px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: radial-gradient(circle at top, rgba(61, 216, 255, 0.25), transparent 55%),
          radial-gradient(circle at 20% 20%, rgba(108, 92, 231, 0.25), transparent 65%),
          var(--bg);
        color: var(--text-strong);
        font-family: 'Space Grotesk', 'Inter', system-ui, -apple-system, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: clamp(24px, 4vw, 60px);
      }

      main {
        width: min(520px, 100%);
        border-radius: 36px;
        border: 1px solid var(--border);
        background: linear-gradient(160deg, rgba(11, 15, 27, 0.9), rgba(8, 12, 24, 0.95));
        padding: clamp(28px, 6vw, 48px);
        box-shadow: 0 40px 120px rgba(0, 0, 0, 0.55);
        display: grid;
        gap: 26px;
      }

      header {
        text-align: center;
      }

      header img {
      width: 200px;
      height: 100px;      /* controla o tamanho visual */
      object-fit: cover ;

      margin: 0 auto 18px;
      display: block;
      }

      header h1 {
        margin: 0;
        font-size: clamp(1.8rem, 5vw, 2.4rem);
        letter-spacing: -0.02em;
      }

      header p {
        margin: 10px auto 0;
        max-width: 360px;
        color: var(--text-soft);
        line-height: 1.6;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 6px 14px;
        border-radius: 999px;
        font-size: 0.78rem;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--accent-2);
        border: 1px solid rgba(61, 216, 255, 0.4);
        margin-bottom: 14px;
      }

      .link-stack {
        display: grid;
        gap: 16px;
      }

      .link-card {
        background: var(--card);
        border-radius: var(--radius);
        border: 1px solid rgba(255, 255, 255, 0.05);
        padding: 18px 22px;
        text-decoration: none;
        color: inherit;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        transition: transform 180ms ease, border-color 180ms ease, box-shadow 180ms ease;
      }

      .link-card:hover,
      .link-card:focus-visible {
        transform: translateY(-4px);
        border-color: rgba(108, 92, 231, 0.65);
        box-shadow: 0 20px 40px rgba(108, 92, 231, 0.25);
        outline: none;
      }

      .link-card__info {
        display: grid;
        gap: 4px;
      }

      .link-card__label {
        font-size: 0.8rem;
        letter-spacing: 0.28em;
        text-transform: uppercase;
        color: var(--accent-2);
        font-weight: 600;
        position: relative;
        padding-left: 18px;
      }

      .link-card__label::before {
        content: '';
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--accent);
        position: absolute;
        left: 0;
        top: 50%;
        transform: translateY(-50%);
      }

      .link-card__title {
        font-size: 1.2rem;
        font-weight: 600;
        letter-spacing: -0.01em;
      }

      .link-card__description {
        margin: 0;
        color: var(--text-soft);
        font-size: 0.95rem;
      }

      .arrow {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        border: 1px solid rgba(255, 255, 255, 0.12);
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .arrow svg {
        width: 18px;
        height: 18px;
        stroke: var(--accent-2);
      }

      .footnote {
        text-align: center;
        font-size: 0.85rem;
        color: rgba(255, 255, 255, 0.55);
        line-height: 1.5;
      }

      @media (max-width: 480px) {
        main {
          border-radius: 24px;
          padding: 24px;
        }

        .link-card {
          flex-direction: column;
          align-items: flex-start;
        }

        .arrow {
          width: 36px;
          height: 36px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div class="badge">Canais oficiais</div>
        <img src="{{ url_for('static', filename='images/logo_sidebar.png') }}" alt="Lumina Flow" />
      </header>

      <div class="link-stack" aria-label="Lista de redirecionamentos">
        <a class="link-card" href="{{ links.home }}" aria-label="Ir para o site oficial">
          <div class="link-card__info">
            <span class="link-card__label">Website</span>
            <span class="link-card__title">Site principal</span>
            <p class="link-card__description">Explore recursos, cases e novidades do produto.</p>
          </div>
          <span class="arrow" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M5 12h14M13 6l6 6-6 6" />
            </svg>
          </span>
        </a>

        <a class="link-card" href="{{ links.whatsapp }}" target="_blank" rel="noopener noreferrer" aria-label="Falar com a Lumina Flow via WhatsApp">
          <div class="link-card__info">
            <span class="link-card__label">WhatsApp</span>
            <span class="link-card__title">Atendimento humano</span>
            <p class="link-card__description">Suporte, onboarding e dúvidas comerciais em horário comercial.</p>
          </div>
          <span class="arrow" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M5 12h14M13 6l6 6-6 6" />
            </svg>
          </span>
        </a>

        <a class="link-card" href="{{ links.instagram }}" target="_blank" rel="noopener noreferrer" aria-label="Abrir Instagram da Lumina Flow">
          <div class="link-card__info">
            <span class="link-card__label">Instagram</span>
            <span class="link-card__title">Perfil oficial</span>
            <p class="link-card__description">Bastidores, templates e anúncios rápidos.</p>
          </div>
          <span class="arrow" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M5 12h14M13 6l6 6-6 6" />
            </svg>
          </span>
        </a>
      </div>
    </main>
  </body>
</html>
