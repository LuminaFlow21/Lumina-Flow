{% extends "base.html" %}

{% block title %}Profile - Lumina Flow{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
{% endblock %}

{% block content %}
<div class="dashboard-container">
    <!-- Sidebar -->
    <aside class="dashboard-sidebar">
        <div class="sidebar-header">
            <div class="sidebar-logo">
                <div style="width: 36px; height: 36px; background: linear-gradient(135deg, var(--color-indigo), var(--color-indigo-light)); border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                        <path d="M12 2L2 7l10 5 10-5-10-5z"></path>
                        <path d="M2 17l10 5 10-5"></path>
                        <path d="M2 12l10 5 10-5"></path>
                    </svg>
                </div>
                <span class="font-bold text-navy">Lumina Flow</span>
            </div>
        </div>
        
        <nav class="sidebar-nav">
            <a href="{{ url_for('dashboard.dashboard_view') }}" class="nav-item">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                    <polyline points="14 2 14 8 20 8"></polyline>
                    <line x1="16" y1="13" x2="8" y2="13"></line>
                    <line x1="16" y1="17" x2="8" y2="17"></line>
                </svg>
                <span data-i18n="dashboard.quotations">Orçamentos</span>
            </a>
            <a href="{{ url_for('dashboard.profile') }}" class="nav-item active">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
                <span data-i18n="dashboard.profile">Perfil</span>
            </a>
        </nav>
        
        <div class="sidebar-footer">
            <a href="{{ url_for('auth.logout') }}" class="nav-item nav-item-logout">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                    <polyline points="16 17 21 12 16 7"></polyline>
                    <line x1="21" y1="12" x2="9" y2="12"></line>
                </svg>
                <span data-i18n="dashboard.logout">Sair</span>
            </a>
        </div>
    </aside>
    
    <!-- Main Content -->
    <main class="dashboard-main">
        <div class="dashboard-header">
            <div>
                <h1 data-i18n="dashboard.profile">Perfil</h1>
                <p class="text-slate" data-i18n="dashboard.edit_profile">Editar Perfil</p>
            </div>
        </div>
        
        <div class="quotation-form-card">
            <form id="profileForm" class="quotation-form">
                <div class="form-group">
                    <label class="form-label" data-i18n="dashboard.your_name">Seu Nome</label>
                    <input type="text" name="full_name" class="form-input" data-i18n-placeholder="dashboard.your_name" placeholder="Seu Nome">
                </div>
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-input" value="{{ user_email }}" disabled>
                </div>
                <div class="form-group">
                    <label class="form-label" data-i18n="dashboard.plan_type">Plano</label>
                    <input type="text" class="form-input" value="{{ subscription.plan|capitalize }}" disabled>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary" data-i18n="common.save">Salvar</button>
                </div>
            </form>
        </div>
    </main>
</div>
{% endblock %}

{% block extra_js %}
<script>
document.addEventListener('DOMContentLoaded', () => {
    const form = document.getElementById('profileForm');
    if (form) {
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(form);
            const data = Object.fromEntries(formData);
            try {
                const response = await fetch('/api/profile', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await response.json();
                if (result.success) {
                    alert('Profile updated');
                } else {
                    alert(result.error || 'Error');
                }
            } catch (err) {
                console.error(err);
                alert('Error');
            }
        });
    }
});
</script>
{% endblock %}
